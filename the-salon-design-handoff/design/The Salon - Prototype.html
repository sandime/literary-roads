<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>The Salon — Literary Roads</title>
<link rel="icon" href="assets/salon-cat.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #15484C; }
  #root { height: 100%; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(48,184,178,0.35); border-radius: 6px; }
  ::selection { background: #f66483; color: #15484C; }
  input::placeholder, textarea::placeholder { color: rgba(255,248,231,0.4); font-style: italic; }

  @keyframes salonFloat {
    0%, 100% { transform: rotate(3.5deg) translateY(0); }
    50%      { transform: rotate(3.5deg) translateY(-5px); }
  }
  @keyframes salonShadow {
    0%, 100% { transform: scale(1); opacity: 0.42; }
    50%      { transform: scale(0.82); opacity: 0.28; }
  }
  @keyframes salonGlow {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.06); }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="salon/salon-kit.jsx"></script>
<script type="text/babel" src="salon/salon-screens.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const KEY = 'salon.view.v1';

function App() {
  const [view, setView] = useState(() => localStorage.getItem(KEY) || 'entry');
  useEffect(() => { localStorage.setItem(KEY, view); }, [view]);
  return (
    <div data-screen-label={view === 'entry' ? 'Salon — Entry' : 'Salon — Review'}
      style={{ height: '100%' }}>
      {view === 'entry'
        ? <SalonEntry onEnter={() => setView('review')} />
        : <SalonReview onBack={() => setView('entry')} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
