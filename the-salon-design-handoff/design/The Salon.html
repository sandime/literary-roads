<!doctype html>
<!-- @dsCard group="Brand" name="The Salon" subtitle="Book club, redesigned — atomic ratings + magazine review cards on midnight teal" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Salon — Literary Roads</title>
<link rel="icon" href="assets/salon-cat.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0c2e31; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { display: none; }
  input::placeholder, textarea::placeholder { color: rgba(255,248,231,0.4); font-style: italic; }
  @keyframes salonFloat { 0%,100%{transform:rotate(3.5deg) translateY(0)} 50%{transform:rotate(3.5deg) translateY(-5px)} }
  @keyframes salonShadow { 0%,100%{transform:scale(1);opacity:.42} 50%{transform:scale(.82);opacity:.28} }
  @keyframes salonGlow { 0%,100%{opacity:.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
  @media (prefers-reduced-motion: reduce) { *{animation:none !important} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="salon/salon-kit.jsx"></script>
<script type="text/babel" src="salon/salon-screens.jsx"></script>
<script type="text/babel" src="salon/salon-cards.jsx"></script>

<script type="text/babel">
function Frame({ children, label }) {
  return (
    <IOSDevice width={390} height={844} dark={true}>
      <div style={{ width: '100%', height: '100%' }} data-screen-label={label}>{children}</div>
    </IOSDevice>
  );
}
function CardStage({ children }) {
  return (
    <div style={{ width: '100%', height: '100%', background: '#0c2e31',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>{children}</div>
  );
}
function Wide({ children, label }) {
  return (
    <div data-screen-label={label} style={{ width: '100%', height: '100%', overflow: 'hidden',
      borderRadius: 16, boxShadow: '0 24px 60px rgba(0,0,0,0.5)' }}>{children}</div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="The Salon"
      subtitle="Literary Roads' book club, redesigned. One book every two months; readers post an atomic rating, a one-sentence verdict, and an optional full response. Mid-century-modern 'atomic age' magazine on a deep midnight-teal ground — hot coral is the only action color, the book always levitates inside its frame, the salon cat keeps the room. No emoji. Responsive: a single column on a phone, a multi-column magazine on a wide screen.">

      <DCSection id="entry" title="1 · Entry — the invitation"
        subtitle="The door into The Salon. Masthead (THE SALON / book / author / dates), the levitating book in a coral frame, the salon cat, an editorial note, and the single coral call to action.">
        <DCArtboard id="entry-phone" label="Entry · phone" width={390} height={844}>
          <Frame label="Salon — Entry (phone)"><SalonEntry /></Frame>
        </DCArtboard>
        <DCArtboard id="entry-wide" label="Entry · desktop" width={960} height={620}>
          <Wide label="Salon — Entry (desktop)"><SalonEntry /></Wide>
        </DCArtboard>
      </DCSection>

      <DCSection id="review" title="2 · Review — the magazine"
        subtitle="Persistent masthead, an aggregate atomic rating (appears past 20 reviews), an optional admin pull quote, five featured review cards in rotating coral / magenta / rust, the remaining reviews in an accordion, and the fixed composer. Rate, expand, and type — it's live.">
        <DCArtboard id="review-phone" label="Review · phone" width={390} height={844}>
          <Frame label="Salon — Review (phone)"><SalonReview /></Frame>
        </DCArtboard>
        <DCArtboard id="review-wide" label="Review · desktop magazine" width={1080} height={760}>
          <Wide label="Salon — Review (desktop)"><SalonReview /></Wide>
        </DCArtboard>
      </DCSection>

      <DCSection id="empty" title="3 · Empty state"
        subtitle="No reviews yet. The salon cat holds the room; the composer is ready for the first verdict.">
        <DCArtboard id="empty-phone" label="Empty · be the first" width={390} height={844}>
          <Frame label="Salon — Empty"><SalonEmpty /></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="profile" title="4 · Profile card — three states"
        subtitle="Compact card on the user profile. Pivots from invitation → enrolled (with countdown) → closed (read the published review) as the period runs.">
        <DCArtboard id="pc-join" label="A · not enrolled" width={392} height={320}>
          <CardStage><ProfileSalonCard state="join" /></CardStage>
        </DCArtboard>
        <DCArtboard id="pc-enrolled" label="B · enrolled" width={392} height={300}>
          <CardStage><ProfileSalonCard state="enrolled" /></CardStage>
        </DCArtboard>
        <DCArtboard id="pc-closed" label="C · closed · review published" width={392} height={300}>
          <CardStage><ProfileSalonCard state="closed" /></CardStage>
        </DCArtboard>
      </DCSection>

      <DCSection id="gazette" title="5 · Gazette announcement card"
        subtitle="The feature card that announces a new book in the Gazette's Headlights feed — the bold coral-framed card with the levitating cover, so it's immediately distinctive.">
        <DCArtboard id="gazette-card" label="Gazette · new book announcement" width={410} height={600}>
          <CardStage><GazetteSalonCard /></CardStage>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
