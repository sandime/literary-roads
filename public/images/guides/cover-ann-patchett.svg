  <!-- Tagline -->
  <text x="200" y="537"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11" font-style="italic"
        fill="#1F4F59" fill-opacity="0.6">Inspired by her New York Times essay</text>

  <!-- Bottom decorative gold dots -->
  <circle cx="200" cy="551" r="2"   fill="#D9B15F" opacity="0.45"/>
  <circle cx="188" cy="551" r="1.5" fill="#D9B15F" opacity="0.30"/>
