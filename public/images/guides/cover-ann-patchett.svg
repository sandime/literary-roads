        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="900"
        fill="#D9B15F" letter-spacing="3">LITERARY ROADS GUIDE</text>

  <!-- Thin rule below masthead -->
