<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Salon — Literary Roads</title>
<link rel="icon" href="assets/star-cat-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="salon/salon-kit.jsx"></script>
<script type="text/babel" src="salon/salon-screens.jsx"></script>
<script type="text/babel" src="salon/salon-cards.jsx"></script>

<script type="text/babel">
function Frame({ children, label }) {
  return (
    <IOSDevice width={390} height={844} dark={true}>
      <div style={{ width: '100%', height: '100%' }} data-screen-label={label}>{children}</div>
    </IOSDevice>
  );
}
function CardStage({ children, w = 380, h = 560 }) {
  return (
    <div style={{ width: '100%', height: '100%', background: '#1a1014',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>{children}</div>
  );
}

function App() {
  return (
    <DesignCanvas
      title="The Salon"
      subtitle="Literary Roads' bimonthly reading room — the app's most considered social space. Warm wine-dark surfaces, gold used only where it means something, the book cover always present, no emoji. Mascot: the salon cat, in horn-rims, appearing on the entry and empty states only.">

      <DCSection id="entry" title="1 · Entry / announcement"
        subtitle="The door into The Salon — invitation when you're not enrolled, a warm welcome-back when you are.">
        <DCArtboard id="entry-join" label="Entry · not enrolled" width={390} height={844}>
          <Frame label="Salon — Entry (join)"><SalonEntryJoin/></Frame>
        </DCArtboard>
        <DCArtboard id="entry-enrolled" label="Entry · enrolled" width={390} height={844}>
          <Frame label="Salon — Entry (enrolled)"><SalonEntryEnrolled/></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="convo" title="2 · The conversation"
        subtitle="Discussion cards with gold usernames, spoiler flags, threaded replies (tap the reply count), and a quiet inline composer pinned at the bottom.">
        <DCArtboard id="conversation" label="Conversation · cards + threading" width={390} height={844}>
          <Frame label="Salon — Conversation"><SalonConversation/></Frame>
        </DCArtboard>
        <DCArtboard id="empty" label="Empty state · be the first" width={390} height={844}>
          <Frame label="Salon — Empty"><SalonEmpty/></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="reply" title="3 · Reply bottom sheet"
        subtitle="Slides up over the conversation. Gold top rule, quoted excerpt of who you're answering, char counter, the single orange POST REPLY action.">
        <DCArtboard id="reply-sheet" label="Reply sheet" width={390} height={844}>
          <Frame label="Salon — Reply sheet"><SalonReplySheet/></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="profile" title="4 · Profile card — three states"
        subtitle="Compact card that lives on the user profile. Pivots from invitation → progress → archive as the reading period runs and the review publishes.">
        <DCArtboard id="pc-join" label="A · not enrolled" width={360} height={300}>
          <CardStage><ProfileSalonCard state="join"/></CardStage>
        </DCArtboard>
        <DCArtboard id="pc-enrolled" label="B · enrolled" width={360} height={260}>
          <CardStage><ProfileSalonCard state="enrolled"/></CardStage>
        </DCArtboard>
        <DCArtboard id="pc-review" label="C · finished · review published" width={360} height={260}>
          <CardStage><ProfileSalonCard state="review"/></CardStage>
        </DCArtboard>
      </DCSection>

      <DCSection id="gazette" title="5 · Gazette announcement card"
        subtitle="The feature card that announces a new book in the Gazette's Headlights feed — the only Gazette card with a gold border on all four sides, so it's immediately distinctive.">
        <DCArtboard id="gazette-card" label="Gazette · new book announcement" width={400} height={560}>
          <CardStage><GazetteSalonCard/></CardStage>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
