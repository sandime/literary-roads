<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Salon — Full Scale · Literary Roads</title>
<link rel="icon" href="assets/star-cat-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #160c10; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 6px; }
  .page { min-height: 100vh; padding: 26px 18px 60px; font-family: "Special Elite", Georgia, serif; color: #FFF8E7; }
  .title { font-family: "Bungee", sans-serif; font-size: 20px; letter-spacing: 0.08em; color: #C9A84C;
    text-shadow: 0 0 14px rgba(201,168,76,0.5); text-align: center; margin: 0 0 4px; text-transform: uppercase; }
  .sub { text-align: center; font-size: 12px; color: #A2908C; margin: 0 0 22px; }
  .toolbar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; align-items: center; margin: 0 0 26px; }
  .toolbar button { cursor: pointer; font-family: "Bungee", sans-serif; font-size: 11px; background: rgba(201,168,76,0.08);
    color: #C9A84C; border: 1.5px solid rgba(201,168,76,0.4); border-radius: 8px; padding: 8px 13px; }
  .toolbar button.active { background: #C9A84C; color: #2A1A1F; }
  .toolbar .seg { display: inline-flex; align-items: center; gap: 6px; color: #A2908C; font-size: 11px; }
  .toolbar input[type=range] { accent-color: #FF4E00; }
  .stage { display: flex; flex-wrap: wrap; gap: 40px 30px; justify-content: center; align-items: flex-start; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .lbl { font-family: "Bungee", sans-serif; font-size: 12px; letter-spacing: 0.05em; color: #C9A84C; text-transform: uppercase; }
  .phone { position: relative; background: #140b0f; border-radius: 44px; padding: 12px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 2px rgba(201,168,76,0.18); flex-shrink: 0; }
  .phone .screen { width: 390px; height: 844px; border-radius: 34px; overflow: hidden; position: relative; background: #2A1A1F; }
  .phone .notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 26px;
    background: #140b0f; border-radius: 0 0 16px 16px; z-index: 50; }
  .host { width: 390px; height: 844px; }
  .cardwrap { background: #1a1014; border-radius: 18px; padding: 26px; box-shadow: 0 18px 50px rgba(0,0,0,0.5); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="salon/salon-kit.jsx"></script>
<script type="text/babel" src="salon/salon-screens.jsx"></script>
<script type="text/babel" src="salon/salon-cards.jsx"></script>
<script type="text/babel">
const { useState } = React;
const SCREENS = [
  { id: 'join',    group: 'screen', label: 'Entry · Join',     Comp: window.SalonEntryJoin },
  { id: 'enroll',  group: 'screen', label: 'Entry · Enrolled', Comp: window.SalonEntryEnrolled },
  { id: 'convo',   group: 'screen', label: 'Conversation',     Comp: window.SalonConversation },
  { id: 'empty',   group: 'screen', label: 'Empty State',      Comp: window.SalonEmpty },
  { id: 'reply',   group: 'screen', label: 'Reply Sheet',      Comp: window.SalonReplySheet },
];
const CARDS = [
  { id: 'pc-join',   label: 'Profile · Join',     render: () => <ProfileSalonCard state="join"/> },
  { id: 'pc-enroll', label: 'Profile · Enrolled', render: () => <ProfileSalonCard state="enrolled"/> },
  { id: 'pc-review', label: 'Profile · Review',   render: () => <ProfileSalonCard state="review"/> },
  { id: 'gz',        label: 'Gazette Card',       render: () => <GazetteSalonCard/> },
];
function Phone({ label, Comp, scale }) {
  return (
    <div className="card">
      <div className="lbl">{label}</div>
      <div className="phone" style={{ transform: `scale(${scale})`, transformOrigin: 'top center' }}>
        <div className="notch"></div>
        <div className="screen"><div className="host"><Comp/></div></div>
      </div>
    </div>
  );
}
function App() {
  const [filter, setFilter] = useState('all');
  const [scale, setScale] = useState(0.85);
  const showScreens = filter === 'all' || filter === 'screen';
  const showCards = filter === 'all' || filter === 'card';
  return (
    <div className="page">
      <h1 className="title">The Salon</h1>
      <p className="sub">Full-scale views · screens are 390×844, live and interactive · tap reply counts, type in composers</p>
      <div className="toolbar">
        <button className={filter==='all'?'active':''} onClick={()=>setFilter('all')}>EVERYTHING</button>
        <button className={filter==='screen'?'active':''} onClick={()=>setFilter('screen')}>SCREENS</button>
        <button className={filter==='card'?'active':''} onClick={()=>setFilter('card')}>CARDS</button>
        <span className="seg">ZOOM
          <input type="range" min="0.5" max="1.2" step="0.05" value={scale} onChange={e=>setScale(+e.target.value)}/>
          {Math.round(scale*100)}%</span>
      </div>
      {showScreens && <div className="stage" style={{ marginBottom: showCards ? 50 : 0 }}>
        {SCREENS.map(s => <Phone key={s.id} label={s.label} Comp={s.Comp} scale={scale}/>)}
      </div>}
      {showCards && <div className="stage">
        {CARDS.map(c => (
          <div key={c.id} className="card">
            <div className="lbl">{c.label}</div>
            <div className="cardwrap" style={{ transform: `scale(${Math.min(1.1, scale + 0.15)})`, transformOrigin: 'top center' }}>{c.render()}</div>
          </div>
        ))}
      </div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
